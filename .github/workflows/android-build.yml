name: Build release APK (ClauseVault)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  release-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble release APK (production API + Supabase baked in)
        run: ./gradlew assembleRelease --no-daemon

      - name: Single friendly filename for download
        run: cp app/build/outputs/apk/release/app-release.apk ClauseVault.apk && ls -la ClauseVault.apk

      - uses: actions/upload-artifact@v4
        with:
          name: ClauseVault-apk
          path: ClauseVault.apk
